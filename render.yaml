# Render Blueprint for SkillHire AI.
# Creates:
#   1. skillhire-backend  - FastAPI API
#   2. skillhire-frontend - Streamlit UI
#   3. skillhire-db       - Render Postgres database

services:
  - type: web
    name: skillhire-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm || true

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: API_STR
        value: /api/v1
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: skillhire-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.14"

    healthCheckPath: /health

  - type: web
    name: skillhire-frontend
    runtime: python
    region: singapore
    plan: free
    rootDir: frontend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false

    envVars:
      - key: BACKEND_URL
        fromService:
          name: skillhire-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH_BACKEND_URL
        fromService:
          name: skillhire-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          name: skillhire-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PYTHON_VERSION
        value: "3.10.14"

    healthCheckPath: /

databases:
  - name: skillhire-db
    region: singapore
    plan: free
    databaseName: skillhire_ai
    user: skillhire
    postgresMajorVersion: "16"
