version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: skillhire_db
    environment:
      POSTGRES_USER: skillhire
      POSTGRES_PASSWORD: skillhire
      POSTGRES_DB: skillhire_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhire -d skillhire_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: skillhire_backend
    ports:
      - "8000:8000"
    environment:
      - API_STR=/api/v1
      - ALLOWED_ORIGINS=http://localhost:8501,http://frontend:8501
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://skillhire:skillhire@db:5432/skillhire_ai}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: skillhire_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
